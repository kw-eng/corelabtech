{% extends "layout.html" %}

{% block content %}

<h1>AI Research Analysis</h1>

<table>

<tr>
<th>Pressure</th>
<th>Oxygen</th>
<th>Duration</th>
<th>Status</th>
</tr>

{% for r in results %}

<tr>

<td>{{r.pressure}}</td>

<td>{{r.oxygen}}</td>

<td>{{r.duration}}</td>

<td>{{r.status}}</td>

</tr>

{% endfor %}

</table>

{% endblock %}
