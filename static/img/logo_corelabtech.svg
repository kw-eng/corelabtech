<svg width="600" height="220" viewBox="0 0 600 220" xmlns="http://www.w3.org/2000/svg">

<style>
.title { font-family: Arial, Helvetica, sans-serif; font-size:48px; font-weight:700;}
.subtitle { font-family: Arial, Helvetica, sans-serif; font-size:16px; letter-spacing:3px;}
</style>

<!-- shield background -->
<circle cx="90" cy="90" r="70" fill="#2C3440"/>

<!-- capsule shape -->
<path d="M90 45
Q120 45 120 75
L120 105
Q120 135 90 135
Q60 135 60 105
L60 75
Q60 45 90 45Z"
fill="white"/>

<!-- text -->
<text x="180" y="90" class="title">
<tspan fill="#1E2A38">Core</tspan>
<tspan fill="#2FA36B">LabTech</tspan>
</text>

<line x1="180" y1="110" x2="330" y2="110" stroke="#999" stroke-width="1"/>
<line x1="430" y1="110" x2="580" y2="110" stroke="#999" stroke-width="1"/>

<text x="350" y="115" text-anchor="middle" class="subtitle" fill="#444">
RESEARCH & AI TESTING LAB
</text>

</svg>