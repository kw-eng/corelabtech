<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- background -->
  <rect x="6" y="6" width="52" height="52" rx="12" fill="#0b1220" stroke="#00e0ff" stroke-width="2"/>

  <!-- ring -->
  <circle cx="32" cy="32" r="12" fill="none" stroke="#00e0ff" stroke-width="3"/>

  <!-- inner hole -->
  <circle cx="32" cy="32" r="6" fill="#0b1220"/>

  <!-- sensor dot -->
